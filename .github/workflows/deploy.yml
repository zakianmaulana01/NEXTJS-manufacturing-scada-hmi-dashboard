name: CI/CD Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      - name: Bundle for deployment
        run: |
          tar --exclude='node_modules' --exclude='.git' \
              -czvf hmi-deploy.tar.gz \
              .next src server.js package.json package-lock.json \
              next.config.js postcss.config.js tailwind.config.ts tsconfig.json

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          port: ${{ secrets.VPS_PORT }}
          source: "hmi-deploy.tar.gz"
          target: "/var/www/hmi-dashboard"

      - name: Deploy & Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR="/var/www/hmi-dashboard"
            APP_NAME="hmi-dashboard"
            APP_PORT="3000"
            DOMAIN="${{ secrets.VPS_DOMAIN }}"

            echo "--- Installing system deps ---"
            which node || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs)
            which npm || apt-get install -y npm
            which pm2 || npm install -g pm2
            which nginx || apt-get install -y nginx
            which certbot || (apt-get install -y certbot python3-certbot-nginx || true)

            echo "--- Extracting build ---"
            cd $APP_DIR
            tar -xzvf hmi-deploy.tar.gz
            rm -f hmi-deploy.tar.gz

            echo "--- Installing deps ---"
            npm install --omit=dev

            echo "--- Restarting app via PM2 ---"
            pm2 stop $APP_NAME 2>/dev/null || true
            pm2 delete $APP_NAME 2>/dev/null || true
            PORT=$APP_PORT pm2 start server.js --name $APP_NAME
            pm2 save

            echo "--- Configuring Nginx ---"
            cat > /etc/nginx/sites-available/$APP_NAME << NGINX
            server {
                listen 80;
                server_name $DOMAIN;

                location / {
                    proxy_pass http://127.0.0.1:$APP_PORT;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                    proxy_read_timeout 86400;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/$APP_NAME /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl reload nginx

            echo "--- SSL via Certbot ---"
            certbot --nginx -d $DOMAIN --non-interactive --agree-tos \
              -m admin@$DOMAIN --redirect 2>/dev/null || \
            certbot --nginx -d $DOMAIN --non-interactive --agree-tos \
              -m webmaster@$DOMAIN --redirect 2>/dev/null || \
            echo "Certbot skipped, continuing..."

            echo "=== DEPLOY DONE ==="
            echo "Running at: http://$DOMAIN"
            pm2 status
